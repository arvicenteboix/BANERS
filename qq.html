<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Familias FP - Colores Neutros</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f8f9fa;
        }

        select {
            padding: 12px;
            font-size: 16px;
            width: 450px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
        }

        #preview {
            margin-top: 20px;
            height: 140px;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            background: white;
        }

        h2 {
            color: #495057;
        }
    </style>
</head>

<body>
    <h2>Selecciona una Familia Profesional</h2>

    <select id="familiaSelect" onchange="colorfamilia()">
        <option value="">-- Elige una familia --</option>
        <option value="actividades">Actividades físicas y deportivas</option>
        <option value="administracion">Administración y gestión</option>
        <option value="agraria">Agraria</option>
        <option value="artesgraficas">Artes gráficas</option>
        <option value="artesartesianas">Artes y artesanías</option>
        <option value="comerciomarketing">Comercio y marketing</option>
        <option value="edificacion">Edificación y obra civil</option>
        <option value="electricidad">Electricidad y electrónica</option>
        <option value="energia">Energía y agua</option>
        <option value="fabricacion">Fabricación mecánica</option>
        <option value="hosteleria">Hostelería y turismo</option>
        <option value="imagenpersonal">Imagen personal</option>
        <option value="imagensonido">Imagen y sonido</option>
        <option value="alimentarias">Industrias alimentarias</option>
        <option value="extractivas">Industrias extractivas</option>
        <option value="informatica">Informática y comunicaciones</option>
        <option value="instalacion">Instalación y mantenimiento</option>
        <option value="madera">Madera, mueble y corcho</option>
        <option value="maritimo">Marítimo-pesquera</option>
        <option value="quimica">Química</option>
        <option value="sanidad">Sanidad</option>
        <option value="seguridad">Seguridad y medio ambiente</option>
        <option value="servicios">Servicios socioculturales y a la comunidad</option>
        <option value="textil">Textil, confección y piel</option>
        <option value="transporte">Transporte y mantenimiento de vehículos</option>
        <option value="vidrioceramica">Vidrio y cerámica</option>
    </select>

    <div id="preview"></div>

    </script>
</body>

</html>
